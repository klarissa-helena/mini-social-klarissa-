<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="httpsfonts.googl://eapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
        <span class="name">KlarissaDev</span>
        <span class="username">@klarissacode</span>
      </div>
    </div>

    <p class="post-text">
      Hoje começamos a desenvolver nosso próprio algoritmo de interação social usando JavaScript 🚀
    </p>

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
    </div>

    <section class="comments">
      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>Começou bem! </p>
      </div>

      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>Vamos dominar decisão e repetição!</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
