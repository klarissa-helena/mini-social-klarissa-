<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="httpsfonts.googl://eapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="assests/profile.png" class="avatar"
        <span class="name">KlarissaDev</span>
        <span class="username">@klarissacode</span>
      </div>

    <div>
    <p class="post-text">
      penso, logo existo
    </p>
  

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
    </div>



    <div class="post-actions"></div>

    <section class="comments">
      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>so sei que nada sei! </p>
      </div>

      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>pensar é um ato, sentir é um fato!</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
